<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godown Bill App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Godown Bill Tracker</h2>

    <div class="card">
        <h3>Save a New Bill</h3>
        <input type="text" id="billNum" placeholder="Enter Bill Number">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <button onclick="uploadBill()">Upload to Cloud</button>
        <p id="uploadStatus"></p>
    </div>

    <div class="card">
        <h3>Search Past Bills</h3>
        <input type="text" id="searchNum" placeholder="Enter Bill Number">
        <button onclick="searchBill()">Find Bill</button>
        <p id="searchStatus"></p>
        <div id="imageGallery" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
